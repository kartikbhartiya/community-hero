# Cloud Build → builds the Docker image (with NEXT_PUBLIC build args) and
# deploys to Cloud Run in one shot.
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_NEXT_PUBLIC_SUPABASE_URL=...,_NEXT_PUBLIC_SUPABASE_ANON_KEY=...,_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=...
#
# (Runtime secrets like GEMINI_API_KEY are set on the Cloud Run service — see DEPLOY.md.)

substitutions:
  _REGION: us-central1
  _SERVICE: community-hero
  _REPO: community-hero
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - --build-arg
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - .

  - name: gcr.io/cloud-builders/docker
    id: push
    args: [push, "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
